{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold">Exercise Library</h2>
                <p class="text-muted">Browse and manage exercises for your workouts</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExerciseModal">
                <span class="material-symbols-outlined me-1">add</span>
                Add Exercise
            </button>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <input type="text" id="searchExercises" class="form-control" placeholder="Search exercises...">
        </div>
        <div class="col-md-3">
            <select id="filterMuscleGroup" class="form-select">
                <option value="">All Muscle Groups</option>
                <option value="chest">Chest</option>
                <option value="back">Back</option>
                <option value="legs">Legs</option>
                <option value="shoulders">Shoulders</option>
                <option value="arms">Arms</option>
                <option value="core">Core</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="filterEquipment" class="form-select">
                <option value="">All Equipment</option>
                <option value="barbell">Barbell</option>
                <option value="dumbbell">Dumbbell</option>
                <option value="bodyweight">Bodyweight</option>
                <option value="machine">Machine</option>
                <option value="cable">Cable</option>
                <option value="EZ bar">EZ Bar</option>
                <option value="wheel">Ab Wheel</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Reset Filters</button>
        </div>
    </div>

    <div class="row" id="exercisesGrid">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="addExerciseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Exercise</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addExerciseForm">
                    <div class="mb-3">
                        <label class="form-label">Exercise Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Muscle Group</label>
                        <select class="form-select" name="muscle_group" required>
                            <option value="chest">Chest</option>
                            <option value="back">Back</option>
                            <option value="legs">Legs</option>
                            <option value="shoulders">Shoulders</option>
                            <option value="arms">Arms</option>
                            <option value="core">Core</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Equipment</label>
                        <input type="text" class="form-control" name="equipment" placeholder="e.g., Barbell, Dumbbell, Bodyweight">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">YouTube URL (for form guide)</label>
                        <input type="url" class="form-control" name="youtube_url" placeholder="https://youtube.com/watch?v=...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Form Tips</label>
                        <textarea class="form-control" name="form_tips" rows="3" placeholder="Key form cues for this exercise..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveExercise()">Save Exercise</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="exerciseDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalExerciseName">Exercise Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <div id="modalVideoContainer" class="ratio ratio-16x9 mb-3">
                            <div class="bg-dark d-flex align-items-center justify-content-center text-white">
                                No video available for this exercise
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="fw-bold">Form Tips</h6>
                        <p id="modalFormTips" class="text-muted">No form tips available</p>
                        <hr>
                        <h6 class="fw-bold">Equipment</h6>
                        <p id="modalEquipment" class="text-muted">-</p>
                        <hr>
                        <h6 class="fw-bold">Muscle Group</h6>
                        <p id="modalMuscleGroup" class="text-muted">-</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="modalAddToRoutineBtn">Add to Routine</button>
            </div>
        </div>
    </div>
</div>

<script>
    let allExercises = [];
    let currentExerciseId = null;
    
    async function loadExercises() {
        try {
            const response = await fetch('/api/exercises');
            allExercises = await response.json();
            filterAndDisplayExercises();
        } catch (error) {
            console.error('Error loading exercises:', error);
        }
    }
    
    function filterAndDisplayExercises() {
        const searchTerm = document.getElementById('searchExercises').value.toLowerCase();
        const muscleGroup = document.getElementById('filterMuscleGroup').value;
        const equipment = document.getElementById('filterEquipment').value;
        
        const filtered = allExercises.filter(ex => {
            const matchesSearch = ex.name.toLowerCase().includes(searchTerm);
            const matchesMuscle = !muscleGroup || ex.muscle_group === muscleGroup;
            const matchesEquipment = !equipment || (ex.equipment && ex.equipment.toLowerCase().includes(equipment));
            return matchesSearch && matchesMuscle && matchesEquipment;
        });
        
        displayExercises(filtered);
    }
    
    function getYouTubeEmbedUrl(url) {
        if (!url) return null;
        let videoId = url.split('v=')[1];
        if (videoId) {
            videoId = videoId.split('&')[0];
            return `https://www.youtube.com/embed/${videoId}`;
        }
        videoId = url.split('/').pop();
        if (videoId && videoId.length === 11) {
            return `https://www.youtube.com/embed/${videoId}`;
        }
        return null;
    }
    
    function showExerciseDetails(exercise) {
        currentExerciseId = exercise.id;
        document.getElementById('modalExerciseName').textContent = exercise.name;
        document.getElementById('modalFormTips').textContent = exercise.form_tips || 'No form tips available for this exercise.';
        document.getElementById('modalEquipment').textContent = exercise.equipment || 'Bodyweight / No equipment';
        document.getElementById('modalMuscleGroup').textContent = exercise.muscle_group.charAt(0).toUpperCase() + exercise.muscle_group.slice(1);
        
        const videoContainer = document.getElementById('modalVideoContainer');
        const embedUrl = getYouTubeEmbedUrl(exercise.youtube_url);
        
        if (embedUrl) {
            videoContainer.innerHTML = `<iframe width="100%" height="100%" src="${embedUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            const demoVideos = {
                "bench press": "https://www.youtube.com/embed/gRVjAtPp0Ew",
                "squat": "https://www.youtube.com/embed/aclHkVu9f1I",
                "deadlift": "https://www.youtube.com/embed/1ZXobu7JcKE",
                "pull up": "https://www.youtube.com/embed/eGo4IYlbE5g",
                "push up": "https://www.youtube.com/embed/IODxDxX7oi4",
                "overhead press": "https://www.youtube.com/embed/2yjwXTZQDDI",
                "barbell row": "https://www.youtube.com/embed/9lEF8QyV7Ks",
                "lunges": "https://www.youtube.com/embed/QOVaHwm-Q6U",
                "plank": "https://www.youtube.com/embed/pSHjTRCQxIw",
                "bicep curls": "https://www.youtube.com/embed/ykJmrZ5v0Oo",
                "tricep pushdown": "https://www.youtube.com/embed/2-LAMcpzODU",
                "leg press": "https://www.youtube.com/embed/IZxyjW7MPJQ",
                "lat pulldown": "https://www.youtube.com/embed/CAwf7n6Luuc",
                "face pulls": "https://www.youtube.com/embed/V8dZ2DNw_ZM",
                "russian twists": "https://www.youtube.com/embed/wkD8rjkodUI"
            };
            
            let searchName = exercise.name.toLowerCase();
            let demoUrl = null;
            
            for (let [key, url] of Object.entries(demoVideos)) {
                if (searchName.includes(key)) {
                    demoUrl = url;
                    break;
                }
            }
            
            if (demoUrl) {
                videoContainer.innerHTML = `<iframe width="100%" height="100%" src="${demoUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = `<div class="bg-dark d-flex align-items-center justify-content-center text-white" style="height: 100%; min-height: 200px;">
                    <div class="text-center">
                        <span class="material-symbols-outlined" style="font-size: 48px;">fitness_center</span>
                        <p class="mt-2">No video available for ${exercise.name}</p>
                        <small>You can add a YouTube URL when editing this exercise</small>
                    </div>
                </div>`;
            }
        }
        
        const modal = new bootstrap.Modal(document.getElementById('exerciseDetailModal'));
        modal.show();
    }
    
    function displayExercises(exercises) {
        const grid = document.getElementById('exercisesGrid');
        
        if (exercises.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">No exercises found. Add your first exercise!</p></div>';
            return;
        }
        
        grid.innerHTML = exercises.map(ex => `
            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card h-100 exercise-card" style="cursor: pointer;" onclick="showExerciseDetails(${JSON.stringify(ex).replace(/"/g, '&quot;')})">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h6 class="card-title fw-bold">${escapeHtml(ex.name)}</h6>
                            <span class="material-symbols-outlined text-primary" style="font-size: 20px;">info</span>
                        </div>
                        <span class="badge bg-primary mb-2">${ex.muscle_group}</span>
                        ${ex.equipment ? `<span class="badge bg-secondary mb-2">${ex.equipment}</span>` : ''}
                        <p class="card-text small text-muted mt-2">${ex.form_tips ? ex.form_tips.substring(0, 80) + '...' : 'Click to view form tips and video guide'}</p>
                        ${ex.youtube_url ? '<span class="badge bg-danger"><span class="material-symbols-outlined" style="font-size: 12px;">play_circle</span> Video Available</span>' : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    async function saveExercise() {
        const form = document.getElementById('addExerciseForm');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        
        try {
            const response = await fetch('/api/exercises', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addExerciseModal')).hide();
                form.reset();
                loadExercises();
                showToast('Exercise added successfully!', 'success');
            } else {
                showToast('Error adding exercise', 'danger');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Error adding exercise', 'danger');
        }
    }
    
    document.getElementById('modalAddToRoutineBtn').addEventListener('click', () => {
        if (currentExerciseId) {
            window.location.href = `/app/routines/create?exercise_id=${currentExerciseId}`;
        }
    });
    
    function resetFilters() {
        document.getElementById('searchExercises').value = '';
        document.getElementById('filterMuscleGroup').value = '';
        document.getElementById('filterEquipment').value = '';
        filterAndDisplayExercises();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showToast(message, type) {
        const toastHtml = `
            <div class="toast align-items-center text-white bg-${type} border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        const container = document.querySelector('.toast-container');
        container.insertAdjacentHTML('beforeend', toastHtml);
        const toast = new bootstrap.Toast(container.lastElementChild);
        toast.show();
        container.lastElementChild.addEventListener('hidden.bs.toast', () => {
            container.lastElementChild.remove();
        });
    }
    
    document.getElementById('searchExercises').addEventListener('input', filterAndDisplayExercises);
    document.getElementById('filterMuscleGroup').addEventListener('change', filterAndDisplayExercises);
    document.getElementById('filterEquipment').addEventListener('change', filterAndDisplayExercises);
    
    loadExercises();
</script>
{% endblock %}
