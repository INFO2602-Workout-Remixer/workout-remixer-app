{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Community Routines</h2>
            <p class="text-muted">Browse and remix workouts shared by other users</p>
        </div>
    </div>
    <div class="row" id="communityRoutines">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<script>
    async function loadCommunityRoutines() {
        try {
            const response = await fetch('/api/routines/public');
            const routines = await response.json();
            const container = document.getElementById('communityRoutines');
            
            if (routines.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">No public routines yet. Be the first to share one!</p></div>';
                return;
            }
            
            container.innerHTML = routines.map(r => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">${r.name}</h5>
                            <p class="card-text text-muted small">${r.description || 'No description'}</p>
                            <div class="mt-3">
                                <span class="badge bg-info">${r.exercise_count || 0} exercises</span>
                                <span class="badge bg-secondary">By: ${r.username || 'Unknown'}</span>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent">
                            <button class="btn btn-sm btn-outline-primary w-100" onclick="remixRoutine(${r.id})">Remix This Routine</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading community routines:', error);
        }
    }
    
    function remixRoutine(routineId) {
        window.location.href = `/app/routines/${routineId}/remix`;
    }
    
    loadCommunityRoutines();
</script>
{% endblock %}
