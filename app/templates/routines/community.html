{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold" style="color: #60a5fa;">Community Routines</h2>
            <p class="text-secondary">Browse and remix workouts shared by other users</p>
        </div>
    </div>
    <div class="row" id="communityRoutines">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<style>
    .community-card {
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .community-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
    .btn-remix {
        background: linear-gradient(135deg, #3b82f6, #f97316);
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 10px;
        font-weight: 500;
        transition: all 0.2s;
    }
    .btn-remix:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        color: white;
    }
</style>

<script>
    async function loadCommunityRoutines() {
        try {
            const response = await fetch('/api/routines/public');
            const routines = await response.json();
            const container = document.getElementById('communityRoutines');
            
            if (routines.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <p class="text-secondary">No public routines yet. Create a routine and make it public to share!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = routines.map(r => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="community-card p-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title fw-bold" style="color: #60a5fa;">${escapeHtml(r.name)}</h5>
                                <span class="badge" style="background: #f97316;">Public</span>
                            </div>
                            <p class="card-text text-secondary small mt-2">${escapeHtml(r.description) || 'No description'}</p>
                            <div class="mt-3">
                                <span class="badge bg-info me-2">${r.exercise_count || 0} exercises</span>
                                <span class="badge" style="background: #3b82f6;">By: ${escapeHtml(r.username)}</span>
                            </div>
                        </div>
                        <div class="mt-3">
                            <button class="btn-remix w-100" onclick="remixRoutine(${r.id})">
                                <span class="material-symbols-outlined me-1" style="font-size: 16px;">auto_awesome</span>
                                AI Remix This Routine
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading community routines:', error);
            document.getElementById('communityRoutines').innerHTML = `
                <div class="col-12 text-center py-5">
                    <p class="text-danger">Error loading community routines. Please refresh the page.</p>
                </div>
            `;
        }
    }
    
    async function remixRoutine(routineId) {
        if (confirm('🤖 AI will analyze this routine and suggest alternative exercises. This may take a few seconds. Continue?')) {
            try {
                showToast('🤖 AI is generating exercise suggestions...', 'info');
                
                const response = await fetch(`/api/routines/${routineId}/remix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    showToast(`✅ AI Remix created: ${result.name}`, 'success');
                    setTimeout(() => {
                        window.location.href = '/app/routines';
                    }, 1500);
                } else {
                    const error = await response.text();
                    console.error('Remix error:', error);
                    showToast('❌ Error creating AI remix. Please try again.', 'danger');
                }
            } catch (error) {
                console.error('Error remixing routine:', error);
                showToast('❌ Network error. Please check your connection.', 'danger');
            }
        }
    }
    
    function showToast(message, type) {
        let toastContainer = document.querySelector('.toast-container');
        if (!toastContainer) {
            toastContainer = document.createElement('div');
            toastContainer.className = 'toast-container position-fixed bottom-0 end-0 p-3';
            document.body.appendChild(toastContainer);
        }
        
        let bgColor = 'bg-primary';
        if (type === 'success') bgColor = 'bg-success';
        else if (type === 'danger') bgColor = 'bg-danger';
        else if (type === 'info') bgColor = 'bg-info';
        
        const toastHtml = `
            <div class="toast align-items-center text-white ${bgColor} border-0" role="alert" data-bs-autohide="true" data-bs-delay="3000">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        
        toastContainer.insertAdjacentHTML('beforeend', toastHtml);
        const toastElement = toastContainer.lastElementChild;
        const toast = new bootstrap.Toast(toastElement);
        toast.show();
        
        toastElement.addEventListener('hidden.bs.toast', () => {
            toastElement.remove();
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    loadCommunityRoutines();
</script>
{% endblock %}
