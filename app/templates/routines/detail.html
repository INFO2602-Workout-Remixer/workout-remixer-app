{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" id="routineName">Loading...</h4>
        </div>
        <div class="card-body">
            <p id="routineDescription" class="text-muted"></p>
            <h5>Exercises</h5>
            <div id="exercisesList" class="list-group mb-4"></div>
            <button class="btn btn-success" id="startWorkoutBtn">Start Workout</button>
            <button class="btn btn-info" id="remixRoutineBtn">AI Remix</button>
            <a href="/app/routines" class="btn btn-secondary">Back to Routines</a>
        </div>
    </div>
</div>

<script>
    const routineId = {{ routine_id }};
    
    async function loadRoutine() {
        try {
            const response = await fetch(`/api/routines/${routineId}`);
            if (!response.ok) throw new Error('Failed to load routine');
            const routine = await response.json();
            
            document.getElementById('routineName').textContent = routine.name;
            document.getElementById('routineDescription').textContent = routine.description || 'No description';
            
            const container = document.getElementById('exercisesList');
            if (routine.exercises && routine.exercises.length > 0) {
                container.innerHTML = routine.exercises.map((ex, i) => `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${i + 1}. ${ex.name}</strong><br>
                                <small>${ex.sets} sets × ${ex.reps} reps | Rest: ${ex.rest_seconds}s</small>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="text-muted">No exercises in this routine.</p>';
            }
            
            document.getElementById('startWorkoutBtn').onclick = () => {
                window.location.href = `/app/workout/active/${routineId}`;
            };
            
            document.getElementById('remixRoutineBtn').onclick = async () => {
                if (confirm('AI will generate a remix of this routine. Continue?')) {
                    try {
                        const remixResponse = await fetch(`/api/routines/${routineId}/remix`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        if (remixResponse.ok) {
                            alert('AI Remix created! Check your routines list.');
                            window.location.href = '/app/routines';
                        } else {
                            alert('Error creating AI remix');
                        }
                    } catch (error) {
                        alert('Error: ' + error);
                    }
                }
            };
        } catch (error) {
            console.error('Error loading routine:', error);
            document.getElementById('routineName').textContent = 'Error loading routine';
        }
    }
    
    loadRoutine();
</script>
{% endblock %}
