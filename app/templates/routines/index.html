{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold">My Routines</h2>
                <p class="text-muted">Create and manage your workout routines</p>
            </div>
            <a href="/app/routines/create" class="btn btn-primary">
                <span class="material-symbols-outlined me-1">add</span>
                Create Routine
            </a>
        </div>
    </div>

    <div class="row" id="routinesList">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<script>
    async function loadRoutines() {
        try {
            const response = await fetch('/api/routines');
            const routines = await response.json();
            
            const container = document.getElementById('routinesList');
            
            if (routines.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <p class="text-muted">No routines yet. Create your first routine!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = routines.map(routine => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title fw-bold">${escapeHtml(routine.name)}</h5>
                                ${routine.is_favorite ? '<span class="material-symbols-outlined text-warning">star</span>' : ''}
                            </div>
                            <p class="card-text text-muted small">${routine.description || 'No description'}</p>
                            <div class="mt-3">
                                <span class="badge bg-info">${routine.exercise_count || 0} exercises</span>
                                ${routine.is_public ? '<span class="badge bg-success">Public</span>' : '<span class="badge bg-secondary">Private</span>'}
                            </div>
                        </div>
                        <div class="card-footer bg-transparent">
                            <div class="btn-group w-100">
                                <a href="/app/routines/${routine.id}" class="btn btn-sm btn-outline-primary">View</a>
                                <a href="/app/routines/${routine.id}/edit" class="btn btn-sm btn-outline-secondary">Edit</a>
                                <button class="btn btn-sm btn-outline-success" onclick="startWorkout(${routine.id})">Start</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteRoutine(${routine.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading routines:', error);
        }
    }
    
    async function startWorkout(routineId) {
        window.location.href = `/app/workout/active/${routineId}`;
    }
    
    async function deleteRoutine(routineId) {
        if (confirm('Are you sure you want to delete this routine?')) {
            try {
                const response = await fetch(`/api/routines/${routineId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadRoutines();
                    showToast('Routine deleted successfully', 'success');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error deleting routine', 'danger');
            }
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    loadRoutines();
</script>
{% endblock %}
