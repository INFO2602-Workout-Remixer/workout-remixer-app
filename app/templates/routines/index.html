{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold">My Routines</h2>
                <p class="text-muted">Create and manage your workout routines</p>
            </div>
            <a href="/app/routines/create" class="btn btn-primary">
                <span class="material-symbols-outlined me-1">add</span>
                Create Routine
            </a>
        </div>
    </div>

    <div class="row" id="routinesList">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<style>
    .toast-container {
        z-index: 1050;
    }
    .btn-group .btn {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
    }
    .btn-group {
        gap: 2px;
    }
    .card:hover {
        transform: translateY(-3px);
        transition: transform 0.2s ease;
    }
    @media (max-width: 768px) {
    .routines-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
    }
    
    .routine-card .btn-group {
        flex-wrap: wrap;
    }
    
    .routine-card .btn-group .btn {
        flex: 1;
        min-width: 70px;
        font-size: 0.7rem;
    }
}
</style>

<script>
    async function loadRoutines() {
        try {
            const response = await fetch('/api/routines');
            const routines = await response.json();
            
            const container = document.getElementById('routinesList');
            
            if (routines.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <p class="text-muted">No routines yet. Create your first routine!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = routines.map(routine => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title fw-bold">${escapeHtml(routine.name)}</h5>
                                ${routine.is_favorite ? '<span class="material-symbols-outlined text-warning">star</span>' : ''}
                            </div>
                            <p class="card-text text-muted small">${escapeHtml(routine.description) || 'No description'}</p>
                            <div class="mt-3">
                                <span class="badge bg-info">${routine.exercise_count || 0} exercises</span>
                                ${routine.is_public ? '<span class="badge bg-success">Public</span>' : '<span class="badge bg-secondary">Private</span>'}
                            </div>
                        </div>
                        <div class="card-footer bg-transparent">
                            <div class="btn-group w-100 flex-wrap">
                                <a href="/app/routines/${routine.id}" class="btn btn-sm btn-outline-primary">View</a>
                                <a href="/app/routines/${routine.id}/edit" class="btn btn-sm btn-outline-secondary">Edit</a>
                                <button class="btn btn-sm btn-outline-success" onclick="startWorkout(${routine.id})">Start</button>
                                <button class="btn btn-sm btn-outline-info" onclick="remixRoutine(${routine.id})">AI Remix</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteRoutine(${routine.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading routines:', error);
            document.getElementById('routinesList').innerHTML = `
                <div class="col-12 text-center py-5">
                    <p class="text-danger">Error loading routines. Please refresh the page.</p>
                </div>
            `;
        }
    }
    
    async function startWorkout(routineId) {
        window.location.href = `/app/workout/active/${routineId}`;
    }
    
    async function deleteRoutine(routineId) {
        if (confirm('Are you sure you want to delete this routine?')) {
            try {
                const response = await fetch(`/api/routines/${routineId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    await loadRoutines();
                    showToast('Routine deleted successfully', 'success');
                } else {
                    showToast('Error deleting routine', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error deleting routine', 'danger');
            }
        }
    }
    
    async function remixRoutine(routineId) {
        if (confirm('🤖 AI will analyze this routine and suggest alternative exercises. This may take a few seconds. Continue?')) {
            try {
                showToast('🤖 AI is generating exercise suggestions...', 'info');
                
                const response = await fetch(`/api/routines/${routineId}/remix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    showToast(`✅ AI Remix created: ${result.name}`, 'success');
                    setTimeout(() => {
                        loadRoutines();
                    }, 1500);
                } else {
                    const error = await response.text();
                    console.error('Remix error:', error);
                    showToast('❌ Error creating AI remix. Please try again.', 'danger');
                }
            } catch (error) {
                console.error('Error remixing routine:', error);
                showToast('❌ Network error. Please check your connection.', 'danger');
            }
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showToast(message, type) {
        let toastContainer = document.querySelector('.toast-container');
        if (!toastContainer) {
            toastContainer = document.createElement('div');
            toastContainer.className = 'toast-container position-fixed bottom-0 end-0 p-3';
            document.body.appendChild(toastContainer);
        }
        
        let bgColor = 'bg-primary';
        if (type === 'success') {
            bgColor = 'bg-success';
        } else if (type === 'danger') {
            bgColor = 'bg-danger';
        } else if (type === 'info') {
            bgColor = 'bg-info';
        }
        
        const toastHtml = `
            <div class="toast align-items-center text-white ${bgColor} border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
                <div class="d-flex">
                    <div class="toast-body">
                        ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        `;
        
        toastContainer.insertAdjacentHTML('beforeend', toastHtml);
        const toastElement = toastContainer.lastElementChild;
        const toast = new bootstrap.Toast(toastElement);
        toast.show();
        
        toastElement.addEventListener('hidden.bs.toast', () => {
            toastElement.remove();
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        loadRoutines();
    });
</script>
{% endblock %}
