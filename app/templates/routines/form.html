{% extends "authenticated-base.html" %}

{% block subpage_content %}
<style>
    .form-control-custom {
        background-color: #e2e8f0 !important;
        color: #1e293b !important;
        border: 1px solid #cbd5e1 !important;
    }
    .form-control-custom:focus {
        background-color: #f8fafc !important;
        color: #0f172a !important;
        border-color: #3b82f6 !important;
        box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25) !important;
    }
    .form-select-custom {
        background-color: #e2e8f0 !important;
        color: #1e293b !important;
        border: 1px solid #cbd5e1 !important;
    }
    .form-select-custom:focus {
        background-color: #f8fafc !important;
        color: #0f172a !important;
        border-color: #3b82f6 !important;
    }
    .exercise-item-custom {
        background-color: #f1f5f9 !important;
        border: 1px solid #cbd5e1 !important;
        color: #1e293b !important;
    }
    .exercise-item-custom strong {
        color: #1e293b !important;
    }
    .exercise-item-custom small {
        color: #475569 !important;
    }
    .modal-body-custom {
        background-color: #f8fafc;
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">{{ 'Edit Routine' if routine_id else 'Create New Routine' }}</h4>
                </div>
                <div class="card-body">
                    <form id="routineForm">
                        <div class="mb-3">
                            <label class="form-label text-white">Routine Name</label>
                            <input type="text" class="form-control form-control-custom" id="name" required placeholder="e.g., Full Body Workout">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">Description</label>
                            <textarea class="form-control form-control-custom" id="description" rows="3" placeholder="Describe your workout routine..."></textarea>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_public">
                            <label class="form-check-label text-white">Make this routine public for others to see</label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-white">Exercises</label>
                            <div id="exercisesList" class="mb-3"></div>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addExerciseModal">
                                + Add Exercise
                            </button>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Routine</button>
                        <a href="/app/routines" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Exercise Modal -->
<div class="modal fade" id="addExerciseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Add Exercise</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body modal-body-custom">
                <select id="exerciseSelect" class="form-select form-select-custom mb-3">
                    <option value="">Loading exercises...</option>
                </select>
                <input type="number" id="sets" class="form-control form-control-custom mb-2" placeholder="Sets" value="3">
                <input type="number" id="reps" class="form-control form-control-custom mb-2" placeholder="Reps" value="10">
                <input type="number" id="rest_seconds" class="form-control form-control-custom mb-2" placeholder="Rest (seconds)" value="60">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addExercise()">Add</button>
            </div>
        </div>
    </div>
</div>

<script>
    let exercises = [];
    
    async function loadExercises() {
        try {
            console.log("Loading exercises...");
            const response = await fetch('/api/exercises');
            
            if (!response.ok) {
                console.error("API response not OK:", response.status);
                return;
            }
            
            const data = await response.json();
            console.log("Exercises loaded:", data);
            
            const select = document.getElementById('exerciseSelect');
            
            if (data.length === 0) {
                select.innerHTML = '<option value="">No exercises found. Create some first!</option>';
                return;
            }
            
            select.innerHTML = '<option value="">Select Exercise</option>' + 
                data.map(e => `<option value="${e.id}" style="color: #1e293b;">${e.name} (${e.muscle_group})</option>`).join('');
        } catch (error) {
            console.error('Error loading exercises:', error);
            document.getElementById('exerciseSelect').innerHTML = '<option value="">Error loading exercises. Make sure you have added exercises.</option>';
        }
    }
    
    function addExercise() {
        const exerciseId = document.getElementById('exerciseSelect').value;
        const exerciseSelect = document.getElementById('exerciseSelect');
        const selectedOption = exerciseSelect.options[exerciseSelect.selectedIndex];
        const exerciseName = selectedOption ? selectedOption.text.split(' (')[0] : '';
        const sets = document.getElementById('sets').value;
        const reps = document.getElementById('reps').value;
        const rest = document.getElementById('rest_seconds').value;
        
        if (!exerciseId || exerciseId === "") {
            alert('Please select an exercise');
            return;
        }
        
        if (!sets || !reps) {
            alert('Please enter sets and reps');
            return;
        }
        
        exercises.push({ 
            exercise_id: parseInt(exerciseId), 
            name: exerciseName, 
            sets: parseInt(sets), 
            reps: parseInt(reps), 
            rest_seconds: parseInt(rest), 
            order: exercises.length 
        });
        
        renderExercises();
        
        const modal = bootstrap.Modal.getInstance(document.getElementById('addExerciseModal'));
        modal.hide();
        
        document.getElementById('sets').value = '3';
        document.getElementById('reps').value = '10';
        document.getElementById('rest_seconds').value = '60';
    }
    
    function renderExercises() {
        const container = document.getElementById('exercisesList');
        if (exercises.length === 0) {
            container.innerHTML = '<p class="text-white-50">No exercises added yet. Click "Add Exercise" to get started.</p>';
            return;
        }
        
        container.innerHTML = exercises.map((ex, i) => `
            <div class="alert exercise-item-custom d-flex justify-content-between align-items-center">
                <div>
                    <strong>${i + 1}. ${ex.name}</strong><br>
                    <small>${ex.sets} sets × ${ex.reps} reps | Rest: ${ex.rest_seconds}s</small>
                </div>
                <button class="btn btn-sm btn-danger" onclick="removeExercise(${i})">Remove</button>
            </div>
        `).join('');
    }
    
    function removeExercise(index) {
        exercises.splice(index, 1);
        exercises.forEach((ex, i) => ex.order = i);
        renderExercises();
    }
    
    document.getElementById('routineForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        if (!name) {
            alert('Please enter a routine name');
            return;
        }
        
        if (exercises.length === 0) {
            alert('Please add at least one exercise to the routine');
            return;
        }
        
        const data = {
            name: name,
            description: document.getElementById('description').value,
            is_public: document.getElementById('is_public').checked,
            exercises: exercises.map((ex, i) => ({
                exercise_id: ex.exercise_id,
                sets: ex.sets,
                reps: ex.reps,
                rest_seconds: ex.rest_seconds,
                order: i
            }))
        };
        
        console.log("Sending data:", data);
        
        try {
            const response = await fetch('/api/routines', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const result = await response.json();
                console.log("Success:", result);
                window.location.href = '/app/routines';
            } else {
                const error = await response.text();
                console.error("Error response:", error);
                alert('Error saving routine: ' + error);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error saving routine');
        }
    });
    
    loadExercises();
</script>
{% endblock %}
