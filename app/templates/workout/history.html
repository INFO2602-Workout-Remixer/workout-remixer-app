{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Workout History</h2>
            <p class="text-muted">View your past workouts and track progress</p>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Routine</th>
                                    <th>Duration</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="workoutHistory">
                                <tr>
                                    <td colspan="4" class="text-center text-muted">No workouts yet. Complete a workout to see history!</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadHistory() {
        try {
            const response = await fetch('/api/workouts/history');
            const workouts = await response.json();
            const tbody = document.getElementById('workoutHistory');
            
            if (workouts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No workouts yet. Complete a workout to see history!</td></tr>';
                return;
            }
            
            tbody.innerHTML = workouts.map(w => `
                <tr>
                    <td>${new Date(w.date).toLocaleDateString()}</td>
                    <td>${w.routine_name}</td>
                    <td>${w.duration_minutes} min</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewWorkout(${w.id})">View Details</button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error('Error loading history:', error);
        }
    }
    
    function viewWorkout(id) {
        window.location.href = `/app/workouts/${id}`;
    }
    
    loadHistory();
</script>
{% endblock %}
